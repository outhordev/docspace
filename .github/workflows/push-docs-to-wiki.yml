name: Push Docs to Wiki

# Copy this workflow into any project repo that has a /docs folder.
# On push to master, it syncs docs/ to the wiki app's docs/ folder,
# triggering a rebuild.
#
# SETUP:
# 1. Copy this file to .github/workflows/push-docs-to-wiki.yml
# 2. Create a GitHub secret WIKI_DEPLOY_TOKEN with a PAT that has
#    write access to the wiki app repo
# 3. Set WIKI_REPO below to your wiki app repo

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
  workflow_dispatch:

env:
  WIKI_REPO: 'your-org/your-wiki-repo'

jobs:
  push-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Check this isn't a docspace repo
        id: guard
        run: |
          if [ -f "docspace.config.ts" ] || [ -f "docspace.config.js" ]; then
            echo "⏭️  This is a docspace repo — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for docs folder
        if: steps.guard.outputs.skip != 'true'
        id: check
        run: |
          if [ -d "docs" ]; then
            echo "has_docs=true" >> $GITHUB_OUTPUT
          else
            echo "has_docs=false" >> $GITHUB_OUTPUT
            echo "⏭️  No docs/ folder — skipping"
          fi

      - name: Checkout wiki repo
        if: steps.guard.outputs.skip != 'true' && steps.check.outputs.has_docs == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WIKI_REPO }}
          token: ${{ secrets.WIKI_DEPLOY_TOKEN }}
          path: wiki-repo

      - name: Sync docs
        if: steps.guard.outputs.skip != 'true' && steps.check.outputs.has_docs == 'true'
        run: |
          # Clean wiki docs/ and replace with ours
          rm -rf wiki-repo/docs
          cp -r docs wiki-repo/docs
          echo "✅ Copied docs/ to wiki repo"

      - name: Commit and push
        if: steps.guard.outputs.skip != 'true' && steps.check.outputs.has_docs == 'true'
        run: |
          cd wiki-repo
          git config user.name "docs-sync[bot]"
          git config user.email "docs-sync[bot]@users.noreply.github.com"
          git add docs/

          if git diff --staged --quiet; then
            echo "⏭️  No changes to commit"
          else
            REPO="${{ github.event.repository.name }}"
            SHA="${{ github.sha }}"
            git commit -m "docs: sync from ${REPO}@${SHA:0:7}" \
                        -m "Source: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
            git push
            echo "✅ Pushed to wiki repo"
          fi

